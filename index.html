<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junction Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 500;
            color: #000000;
            margin-bottom: 2rem;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 280px;
            border: 2px solid #000000;
            padding: 30px;
            text-decoration: none;
            color: #000000;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* Matches the cream background of the left tile */
        .card.cream {
            background-color: #fcf8e3; 
        }

        /* Matches the white background of the right tile */
        .card.white {
            background-color: #ffffff;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .icon {
            font-size: 1.5rem;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .description {
            font-size: 1rem;
            color: #333333;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .visit-link {
            font-size: 0.9rem;
            color: #666666;
        }
    </style>
</head>
<body>

    <h2>more stuff to explore</h2>

    <div class="container">
        <!-- Itinerary Card -->
        <a href="YOUR_ITINERARY_URL_HERE" class="card cream">
            <div class="card-header">
                <span class="icon">📍</span>
                <span class="title">itinerary</span>
            </div>
            <p class="description">explore detailed travel routes and curated daily schedules.</p>
            <div class="visit-link">visit &rarr;</div>
        </a>

        <!-- Irish Phrases Card -->
        <a href="YOUR_SPREADSHEET_URL_HERE" class="card white">
            <div class="card-header">
                <span class="icon">🗣️</span>
                <span class="title">irish phrases</span>
            </div>
            <p class="description">access the spreadsheet featuring 80 essential irish phrases.</p>
            <div class="visit-link">visit &rarr;</div>
        </a>
    </div>

</body>
</html>
