<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junction Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Vytvorenie šachovnicového efektu */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Generovanie mriežky pomocou lineárnych gradientov */
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0;
            /* Maska, ktorá zabezpečí postupné strácanie (fade) smerom nadol */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }

        h2 {
            font-size: 2rem;
            font-weight: 500;
            color: #000000;
            margin-bottom: 2rem;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 280px;
            border: 2px solid #000000;
            padding: 30px;
            text-decoration: none;
            color: #000000;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* Matches the cream background of the left tile */
        .card.cream {
            background-color: #fcf8e3; 
        }

        /* Matches the white background of the right tile */
        .card.white {
            background-color: #ffffff;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .icon {
            font-size: 1.5rem;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .description {
            font-size: 1rem;
            color: #333333;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .visit-link {
            font-size: 0.9rem;
            color: #666666;
        }
    </style>
</head>
<body>

    <h2>more stuff to explore</h2>

    <div class="container">
        <!-- Itinerary Card -->
        <a href="https://da.gd" class="card cream">
            <div class="card-header">
                <span class="icon">📍</span>
                <span class="title">itinerary</span>
            </div>
            <p class="description">irsko 26</p>
            <div class="visit-link">visit &rarr;</div>
        </a>

        <!-- Irish Phrases Card -->
        <a href="https://da.gd" class="card white">
            <div class="card-header">
                <span class="icon">🗣️</span>
                <span class="title">irish phrases</span>
            </div>
            <p class="description">theres 84 phrases total!!</p>
            <div class="visit-link">visit &rarr;</div>
        </a>
    </div>

</body>
</html>
